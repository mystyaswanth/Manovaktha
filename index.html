      border: 2px solid #EAE0C8;
    }
    ::-webkit-scrollbar-thumb:hover {
      background-color: #4A2C2A;
    }
    /* For screen-reader accessibility */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
